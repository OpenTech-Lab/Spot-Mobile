name: mobile
description: "Spot - Citizen Swarm: Decentralized SNS & Event Timeline Platform"
publish_to: 'none'

version: 0.2.3+17

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.11.0
  geolocator: ^12.0.0
  flutter_secure_storage: ^9.2.2
  device_info_plus: ^11.0.0
  permission_handler: ^11.3.1
  crypto: ^3.0.3
  pointycastle: ^3.9.1
  path_provider: ^2.1.4
  web_socket_channel: ^3.0.1
  uuid: ^4.4.2
  qr_flutter: ^4.1.0
  image: ^4.2.0
  image_picker: ^1.1.2
  convert: ^3.1.1
  bip39: ^1.0.6
  intl: ^0.19.0
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  # Android adaptive icon (API 26+)
  # Background matches the logo's built-in dark canvas (#111111)
  adaptive_icon_background: "#111111"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/logo_transparent.png
    - assets/geo/places.db
