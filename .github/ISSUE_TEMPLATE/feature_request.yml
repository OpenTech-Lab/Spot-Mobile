name: Feature Request
description: Suggest a new feature for the project
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Please fill in the details below so the community can understand the request clearly.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or missing capability
      placeholder: I want this because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you want
      placeholder: The project should support...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives or workarounds
      placeholder: I also considered...

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Useful
        - Important
        - Critical
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Community help
      options:
        - label: I can help test this feature
        - label: I can help design this feature
        - label: I can help implement this feature

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, links, examples, screenshots, or related issues