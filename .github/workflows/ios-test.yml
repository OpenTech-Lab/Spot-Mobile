name: (Test)Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios-ipa:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          pod deintegrate
          pod install

      - name: Validate required runtime secrets
        run: |
          required=(
            SUPABASE_URL
            SUPABASE_ANON_KEY
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Write runtime .env asset
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cat > .env <<EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          EOF

      - name: Build iOS IPA (release, no codesign)
        env:
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
          CDN_PRESIGN_URL: ${{ secrets.CDN_PRESIGN_URL }}
        run: |
          build_cmd=(flutter build ipa --release --no-codesign)
          if [ -n "$CDN_BASE_URL" ]; then
            build_cmd+=("--dart-define=CDN_BASE_URL=$CDN_BASE_URL")
          fi
          if [ -n "$CDN_PRESIGN_URL" ]; then
            build_cmd+=("--dart-define=CDN_PRESIGN_URL=$CDN_PRESIGN_URL")
          fi
          "${build_cmd[@]}"

      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-artifacts
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/ios/ipa/*.ipa
            build/ios/archive/*.xcarchive
            build/ios/**/*.xcarchive
